<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Image Gallery</h2>

<div class="gallery">
  <img src="https://picsum.photos/id/101/300/200" onclick="openLightbox(0)">
  <img src="https://picsum.photos/id/102/300/200" onclick="openLightbox(1)">
  <img src="https://picsum.photos/id/103/300/200" onclick="openLightbox(2)">
  <img src="https://picsum.photos/id/104/300/200" onclick="openLightbox(3)">
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <span class="close" onclick="closeLightbox()">×</span>
  <button class="prev" onclick="changeImage(-1)">❮</button>
  <img id="lightbox-img">
  <button class="next" onclick="changeImage(1)">❯</button>
</div>

<script src="script.js"></script>
</body>
</html>
